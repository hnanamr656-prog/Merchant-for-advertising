<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>التاجر للدعاية</title>

<style>

/* ===== GLOBAL ===== */
body{
margin:0;
font-family:Arial;
color:#fff;
overflow-x:hidden;
scroll-behavior:smooth;
background: radial-gradient(circle at top,#101a33,#0b1020 60%);
}

/* ===== NAV ===== */
nav{
position:fixed;
top:0;
width:100%;
padding:15px;
display:flex;
justify-content:center;
gap:25px;
background:rgba(0,0,0,.35);
backdrop-filter:blur(12px);
z-index:999;
}
nav a{
color:#fff;
text-decoration:none;
font-weight:bold;
transition:.3s;
}
nav a:hover{
color:#00ffd5;
}

/* ===== HERO ===== */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
position:relative;
overflow:hidden;
background:
linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.85)),
url('https://images.unsplash.com/photo-1497366754035-f200968a6e72') center/cover fixed;
}

.hero::before{
content:"";
position:absolute;
inset:0;
background:radial-gradient(circle at center,rgba(0,255,213,.08),transparent 60%);
}

.hero h1{
font-size:60px;
color:#00ffd5;
text-shadow:0 0 25px rgba(0,255,213,.4);
z-index:2;
}

.hero p{
max-width:850px;
line-height:2;
font-size:18px;
opacity:.9;
z-index:2;
}

.cta-btn{
margin-top:25px;
padding:14px 30px;
background:#00ffd5;
color:#000;
text-decoration:none;
border-radius:30px;
font-weight:bold;
z-index:2;
box-shadow:0 10px 25px rgba(0,255,213,.25);
transition:.3s;
}
.cta-btn:hover{
transform:scale(1.05);
}

/* ===== SECTIONS ===== */
section{
padding:130px 20px;
text-align:center;
opacity:0;
transform:translateY(60px) scale(.98);
transition:1s cubic-bezier(.2,.8,.2,1);
}

section.show{
opacity:1;
transform:translateY(0) scale(1);
}

/* ===== STATS ===== */
.stats{
display:flex;
justify-content:center;
gap:60px;
flex-wrap:wrap;
}

.stat h2{
font-size:55px;
color:#00ffd5;
}

/* ===== CARDS ===== */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
margin-top:40px;
}

.card{
background:rgba(255,255,255,.06);
backdrop-filter:blur(12px);
padding:25px;
border-radius:16px;
border:1px solid rgba(255,255,255,.1);
box-shadow:0 10px 30px rgba(0,0,0,.3);
transition:.4s;
}

.card:hover{
transform:translateY(-12px) scale(1.02);
box-shadow:0 20px 40px rgba(0,255,213,.15);
}

.card h3{
color:#00ffd5;
}

/* ===== ABOUT ===== */
.about{
max-width:950px;
margin:auto;
line-height:2.4;
font-size:18px;
opacity:.9;
text-align:right;
}

.about-images{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-top:40px;
}

.about-images img{
width:100%;
height:180px;
object-fit:cover;
border-radius:15px;
border:1px solid rgba(255,255,255,.1);
transition:.4s;
box-shadow:0 10px 25px rgba(0,0,0,.4);
}

.about-images img:hover{
transform:scale(1.06);
box-shadow:0 15px 35px rgba(0,255,213,.2);
}

/* ===== FORM ===== */
form{
max-width:450px;
margin:auto;
display:flex;
flex-direction:column;
gap:12px;
}

input,textarea{
padding:14px;
border:none;
border-radius:10px;
outline:none;
}

button{
padding:14px;
background:#00ffd5;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

/* ===== WHATSAPP ===== */
.whatsapp{
position:fixed;
left:20px;
bottom:20px;
width:60px;
height:60px;
background:#25D366;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
animation:pulse 2s infinite;
text-decoration:none;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

</style>
</head>

<body>

<!-- NAV -->
<nav>
<a href="#services">الخدمات</a>
<a href="#about">من نحن</a>
<a href="#contact">تواصل</a>
</nav>

<!-- HERO -->
<div class="hero">
<h1>التاجر للدعاية</h1>
<p id="typingText"></p>
<a class="cta-btn" href="#contact">ابدأ مشروعك الآن</a>
</div>

<!-- SERVICES -->
<section id="services">
<h2>خدماتنا</h2>

<div class="grid">
<div class="card"><h3>إعلانات ممولة</h3></div>
<div class="card"><h3>سوشيال ميديا</h3></div>
<div class="card"><h3>بوتات تيليجرام</h3></div>
<div class="card"><h3>إنشاء مواقع</h3></div>
</div>
</section>

<!-- ABOUT -->
<section id="about">
<h2>من نحن</h2>

<p class="about" id="aboutText"></p>

<div class="about-images">
<img src="https://images.unsplash.com/photo-1556761175-4b46a572b786">
<img src="https://images.unsplash.com/photo-1557804506-669a67965ba0">
<img src="https://images.unsplash.com/photo-1521737604893-d14cc237f11d">
</div>
</section>

<!-- CONTACT -->
<section id="contact">
<h2>اطلب خدمتك</h2>

<form onsubmit="sendToWhatsApp(event)">
<input id="name" placeholder="الاسم" required>
<input id="phone" placeholder="رقم الهاتف" required>
<input id="service" placeholder="الخدمة" required>
<textarea id="details" placeholder="تفاصيل"></textarea>
<button>إرسال</button>
</form>
</section>

<a class="whatsapp" href="https://wa.me/201024941083">📱</a>

<script>

/* ===== REVEAL ===== */
const sections=document.querySelectorAll("section");
const observer=new IntersectionObserver(entries=>{
entries.forEach(e=>{
if(e.isIntersecting){
e.target.classList.add("show");
}
});
},{threshold:0.15});

sections.forEach(s=>observer.observe(s));

/* ===== HERO TYPING ===== */
const text="نصنع حضورًا بصريًا احترافيًا يساعد علامتك التجارية على الوصول والانتشار وبناء الثقة داخل السوق من خلال حلول دعائية مبتكرة وتنفيذ يليق بطموحك.";

let i=0;
function type(){
if(i<text.length){
document.getElementById("typingText").innerHTML+=text.charAt(i);
i++;
setTimeout(type,30);
}
}
window.onload=type;

/* ===== ABOUT TYPING ===== */
const aboutText=
"نحن شركة التاجر للدعاية والإعلان نقدم حلول تسويقية متكاملة تساعد الشركات على بناء هوية قوية وتحقيق انتشار حقيقي في السوق. نعمل على إدارة الحملات الإعلانية، تصميم المحتوى، وتحسين الظهور الرقمي لتحقيق أفضل النتائج الممكنة لعملائنا.";

let j=0;
function typeAbout(){
if(j<aboutText.length){
document.getElementById("aboutText").innerHTML+=aboutText.charAt(j);
j++;
setTimeout(typeAbout,20);
}
}
setTimeout(typeAbout,1000);

/* ===== WHATSAPP ===== */
function sendToWhatsApp(e){
e.preventDefault();

let msg=
"طلب جديد%0A%0A"+
"الاسم: "+name.value+"%0A"+
"الهاتف: "+phone.value+"%0A"+
"الخدمة: "+service.value+"%0A"+
"التفاصيل: "+details.value;

window.open("https://wa.me/201024941083?text="+encodeURIComponent(msg));
}

</script>

</body>
</html>
